<title>Shannon Town Utd AFC - Coach Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0F1A3A;color:#E8F4FD;min-height:100vh}
#ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0F1A3A,#1B2A5E);padding:20px}
#ls img{width:140px;height:140px;object-fit:contain;margin-bottom:16px}
#ls h1{font-size:1.6rem;color:#5BC8F5;text-align:center;font-weight:900}
#ls p{color:#8AABCA;margin:6px 0 24px;text-align:center}
.lbox{background:#1E3170;border-radius:16px;padding:28px 24px;width:100%;max-width:360px;border:1px solid rgba(91,200,245,0.2)}
.lbox label{display:block;font-size:0.8rem;color:#8AABCA;margin-bottom:6px;text-transform:uppercase}
.lbox input{width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid rgba(91,200,245,0.2);background:rgba(255,255,255,0.07);color:#E8F4FD;font-size:1rem;outline:none}
.lbox input:focus{border-color:#5BC8F5}
.lbtn{margin-top:16px;width:100%;padding:13px;border-radius:10px;border:none;background:#5BC8F5;color:#0F1A3A;font-weight:700;font-size:1rem;cursor:pointer}
.lerr{color:#f87171;font-size:0.85rem;margin-top:8px;text-align:center;display:none}
.tbadge{background:rgba(255,255,255,0.07);border-radius:8px;padding:8px;text-align:center;margin-top:12px;font-size:0.75rem;color:#8AABCA}
.tbadge strong{color:#5BC8F5}
#app{display:none;min-height:100vh;flex-direction:column}
header{background:#1B2A5E;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid #5BC8F5;position:sticky;top:0;z-index:100}
header img{width:42px;height:42px;object-fit:contain}
.htitle{flex:1}
.htitle h1{font-size:0.95rem;color:#5BC8F5;font-weight:900}
.htitle p{font-size:0.68rem;color:#8AABCA}
.hbtn{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#5BC8F5;font-size:0.72rem;cursor:pointer}
nav{background:#1B2A5E;display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:64px;z-index:99;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{flex-shrink:0;padding:10px 13px;background:none;border:none;color:#8AABCA;font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;text-transform:uppercase}
nav button.active{color:#5BC8F5;border-bottom-color:#5BC8F5}
section{display:none;padding:16px;max-width:900px;margin:0 auto;width:100%}
section.active{display:block}
.card{background:#1E3170;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.07)}
.card h2{font-size:1rem;color:#5BC8F5;margin-bottom:12px;font-weight:700}
</style>
</head>

  <nav>
    <button class="active" onclick="sT('drills',this)">Drills</button>

<script>
var ADM = 'STAdmin2026';
var TRL = 'shannon';
var K = 'stu_';

function dL() {
  var v = document.getElementById('pi').value;
  if (v === ADM) {
    localStorage.setItem(K + 'auth', 'admin');
    go();
  } else if (v === TRL) {
    var t = new Date();
    t.setHours(0, 0, 0, 0);
    var st = localStorage.getItem(K + 'ts');
    if (!st) localStorage.setItem(K + 'ts', t.getTime());
    var s = new Date(parseInt(localStorage.getItem(K + 'ts')));
    var ex = new Date(s.getTime() + 14 * 864e5);
    if (t <= ex) {
      localStorage.setItem(K + 'auth', 'trial');
      go();
    } else {
      var e = document.getElementById('le');
      e.textContent = 'Trial expired. Contact A&G Coaching Masterclass.';
      e.style.display = 'block';
      localStorage.removeItem(K + 'auth');
    }
  } else {
    document.getElementById('le').style.display = 'block';
  }
}

function go() {
  document.getElementById('ls').style.display = 'none';
  var a = document.getElementById('app');
  a.style.display = 'flex';
  a.style.flexDirection = 'column';
}

function lg() {
  localStorage.removeItem(K + 'auth');
  document.getElementById('ls').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pi').value = '';
  document.getElementById('le').style.display = 'none';
}

function sT(id, btn) {
  document.querySelectorAll('section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function chkAuth() {
  var auth = localStorage.getItem(K + 'auth');
  if (!auth) return;
  if (auth === 'admin') { go(); return; }
  if (auth === 'trial') {
    var t = new Date();
    t.setHours(0, 0, 0, 0);
    var st = localStorage.getItem(K + 'ts');
    if (!st) { localStorage.removeItem(K + 'auth'); return; }
    var s = new Date(parseInt(st));
    var ex = new Date(s.getTime() + 14 * 864e5);
    if (t <= ex) { go(); }
    else { localStorage.removeItem(K + 'auth'); }
  }
}

window.addEventListener('load', function() { chkAuth(); });
</script>
